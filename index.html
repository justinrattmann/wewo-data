// ── Quiz Editor ────────────────────────────────────────────────
function buildQuizRowLevel(q, qi, lvl) {
  const lc = { leicht:'#2ecc71', mittel:'#f5c800', schwer:'#e63946', profi:'#a855f7' };
  const opts = (q.opts || ['','','','']).map((o, i) => `
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <input type="radio" name="correct-${lvl}-${qi}" value="${i}" ${q.correct===i?'checked':''}
        style="accent-color:${lc[lvl]||'var(--yellow)'};width:15px;height:15px;cursor:pointer"
        onchange="updateLevelQuizCorrect('${lvl}',${qi},${i})">
      <input class="input" style="flex:1;font-size:13px" value="${escHtml(o)}"
        oninput="updateLevelQuizOpt('${lvl}',${qi},${i},this.value)" placeholder="Antwort ${i+1}...">
    </div>`).join('');
  return `<div style="background:var(--dark);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:11px;color:${lc[lvl]||'var(--text-faint)'};font-weight:700;background:${lc[lvl]||'#888'}22;padding:2px 7px;border-radius:3px">F${qi+1}</span>
      <input class="input" style="flex:1;font-size:13px" value="${escHtml(q.q||'')}"
        oninput="updateLevelQuizQ('${lvl}',${qi},this.value)" placeholder="Frage eingeben...">
      <button class="btn btn-ghost btn-sm" style="color:var(--red);padding:3px 8px" onclick="removeLevelQuizRow('${lvl}',${qi})">✕</button>
    </div>
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-faint)">Antworten (● = richtige Antwort):</div>
    ${opts}
  </div>`;
}

function updateLevelQuizQ(lvl, qi, val) {
  if (!STATE._editingModQuizLevels) return;
  if (!STATE._editingModQuizLevels[lvl]) STATE._editingModQuizLevels[lvl] = [];
  if (!STATE._editingModQuizLevels[lvl][qi]) STATE._editingModQuizLevels[lvl][qi] = { q:'', opts:['','','',''], correct:0 };
  STATE._editingModQuizLevels[lvl][qi].q = val;
}

function updateLevelQuizCorrect(lvl, qi, val) {
  if (!STATE._editingModQuizLevels?.[lvl]?.[qi]) return;
  STATE._editingModQuizLevels[lvl][qi].correct = parseInt(val);
}

function updateLevelQuizOpt(lvl, qi, optIdx, val) {
  if (!STATE._editingModQuizLevels?.[lvl]?.[qi]) return;
  STATE._editingModQuizLevels[lvl][qi].opts[optIdx] = val;
}

function addQuizRow_level(lvl) {
  if (!STATE._editingModQuizLevels) STATE._editingModQuizLevels = {};
  if (!STATE._editingModQuizLevels[lvl]) STATE._editingModQuizLevels[lvl] = [];
  const qi = STATE._editingModQuizLevels[lvl].length;
  STATE._editingModQuizLevels[lvl].push({ q: '', opts: ['', '', '', ''], correct: 0 });
  const container = document.getElementById('quiz-rows-' + lvl);
  if (container) {
    container.innerHTML += buildQuizRowLevel(STATE._editingModQuizLevels[lvl][qi], qi, lvl);
  }
}

function removeLevelQuizRow(lvl, qi) {
  if (!STATE._editingModQuizLevels?.[lvl]) return;
  STATE._editingModQuizLevels[lvl].splice(qi, 1);
  const container = document.getElementById('quiz-rows-' + lvl);
  if (container) container.innerHTML = (STATE._editingModQuizLevels[lvl]||[]).map((q,i) => buildQuizRowLevel(q,i,lvl)).join('');
}

function buildQuizRow(q, qi) {
  const opts = (q.opts||['','','','']).map((o, oi) => `
    <div class="flex items-center gap-8 mb-8">
      <input type="radio" name="wq-correct-${qi}" value="${oi}" ${q.correct===oi?'checked':''} 
        style="width:16px;height:16px;cursor:pointer;accent-color:var(--yellow)" title="Als richtige Antwort markieren">
      <input class="input" id="wq-opt-${qi}-${oi}" value="${escHtml(o)}" placeholder="Antwort ${oi+1}">
    </div>
  `).join('');
  return `
    <div class="card mb-12" id="wq-row-${qi}">
      <div class="card-body">
        <div class="flex items-center gap-8 mb-10">
          <span class="badge badge-yellow">Frage ${qi+1}</span>
          <span class="text-dim text-sm" style="flex:1">🟡 = richtige Antwort markieren</span>
          <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="removeQuizRow_we(${qi})">✕ Löschen</button>
        </div>
        <input class="input mb-10" id="wq-q-${qi}" value="${escHtml(q.q||'')}" placeholder="Frage eingeben...">
        ${opts}
      </div>
    </div>
  `;
}

function addQuizRow_we() {
  const container = document.getElementById('we-quiz-rows');
  if (!container) return;
  const qi = container.querySelectorAll('[id^="wq-row-"]').length;
  container.insertAdjacentHTML('beforeend', buildQuizRow({q:'',opts:['','','',''],correct:0}, qi));
  // Update tab label
  const btn = document.getElementById('wetab-quiz');
  if (btn) btn.textContent = `🧩 Quiz (${qi+1} Fragen)`;
}

function removeQuizRow_we(qi) {
  const el = document.getElementById(`wq-row-${qi}`);
  if (el) el.remove();
  // Renumber
  document.querySelectorAll('[id^="wq-row-"]').forEach((row, i) => {
    row.id = `wq-row-${i}`;
    const badge = row.querySelector('.badge-yellow');
    if (badge) badge.textContent = `Frage ${i+1}`;
  });
}

function collectQuizzes_we() {
  const quizzes = [];
  document.querySelectorAll('[id^="wq-row-"]').forEach((row, qi) => {
    const q = document.getElementById(`wq-q-${qi}`)?.value?.trim();
    if (!q) return;
    const opts = [0,1,2,3].map(oi => document.getElementById(`wq-opt-${qi}-${oi}`)?.value?.trim()||'');
    const checked = row.querySelector(`input[name="wq-correct-${qi}"]:checked`);
    quizzes.push({ q, opts, correct: checked ? parseInt(checked.value) : 0 });
  });
  return quizzes;
}

// ── Save / Close ───────────────────────────────────────────────
async function saveWysiwyg() {
  const { role, idx } = STATE.editingModule || {};
  if (role === undefined) return;
  const modules = await getModules(role);
  const m = modules[idx];
  const ed = document.getElementById('we-editor');
  modules[idx] = {
    ...m,
    icon: document.getElementById('we-icon')?.value?.trim() || m.icon,
    title: document.getElementById('we-title')?.value?.trim() || m.title,
    desc: document.getElementById('we-desc')?.value?.trim() || m.desc,
    duration: document.getElementById('we-duration')?.value?.trim() || m.duration,
    content: ed ? ed.innerHTML : m.content,
    quizzes: collectQuizzes_we()
  };
  await saveModules(role, modules);
  // Level-Quiz-Overrides in Firebase speichern
  if (STATE._editingModQuizLevels && m.id) {
    try {
      const overrideKey = 'quiz_levels_override:' + role;
      const existing = await storageGet(overrideKey, true) || {};
      existing[m.id] = STATE._editingModQuizLevels;
      await storageSet(overrideKey, existing, true);
      if (!STATE._quizLevelOverrides) STATE._quizLevelOverrides = {};
      STATE._quizLevelOverrides[m.id] = STATE._editingModQuizLevels;
    } catch(e) { console.warn('Level-Quiz-Override speichern fehlgeschlagen', e); }
  }
  toast('Modul gespeichert ✓');
  closeWysiwyg();
  render();
}

async function revertModuleEdit() {
  const { role, idx, backup } = STATE.editingModule || {};
  if (!backup) return;
  if (!confirm('Alle Änderungen verwerfen?')) return;
  const modules = await getModules(role);
  modules[idx] = backup;
  await saveModules(role, modules);
  toast('Zurückgesetzt ✓');
  closeWysiwyg();
  render();
}

function closeWysiwyg() {
  const modal = document.getElementById('wysiwyg-modal');
  if (modal) modal.style.display = 'none';
  STATE.editingModule = null;
}

// ── Module management ──────────────────────────────────────────
async function moveModule(role, idx, dir) {
  const modules = await getModules(role);
  const ni = idx + dir;
  if (ni < 0 || ni >= modules.length) return;
  [modules[idx], modules[ni]] = [modules[ni], modules[idx]];
  modules.forEach((m, i) => m.num = i);
  await saveModules(role, modules);
  toast('Reihenfolge geändert');
  render();
}

async function toggleModuleDisabled(role, idx) {
  const modules = await getModules(role);
  modules[idx].disabled = !modules[idx].disabled;
  await saveModules(role, modules);
  render();
}

async function addNewModule(role) {
  const modules = await getModules(role);
  const m = {
    id: 'module_' + Date.now(),
    num: modules.length,
    title: 'Neues Modul',
    icon: '📄',
    duration: '30 Min',
    desc: 'Kurzbeschreibung hier eingeben',
    content: '<h2>Titel</h2><p>Inhalt hier eingeben...</p>',
    quizzes: [],

  };
  modules.push(m);
  await saveModules(role, modules);
  toast('Neues Modul angelegt ✓');
  STATE.contentTab = role==='ad' ? 'ad_modules' : 'id_modules';
  render();
  setTimeout(() => openWysiwyg(role, modules.length - 1), 400);
}

async function renderEmployeePortal() {
  const user = STATE.currentUser;
  const role = user.role; // 'ad' or 'id'

            : (openTaskCount > 0 ? `<span style="position:absolute;top:6px;right:6px;background:var(--yellow);color:#000;border-radius:999px;font-size:9px;font-weight:700;padding:0 4px;line-height:1.6">${openTaskCount}</span>` : '')
          }
        </div>
        <div class="nav-section">${STATE.sidebarCollapsed ? '' : 'Fortschritt'}</div>
        ${empNavItem('progress', '📊', 'Mein Fortschritt', page)}
        ${empNavItem('types', '🧠', 'Persönlichkeitstypen', page)}
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip" onclick="logout()">

        </div>
        <div class="flex-1">
          <div style="font-size:14px;font-weight:600;${t.done ? 'text-decoration:line-through;opacity:0.5' : ''}">${escHtml(t.title)}</div>
          ${t.module ? `<div class="text-dim text-sm">📚 ${escHtml(t.module)}</div>` : ''}
          ${deadlineStr ? `<div class="text-sm" style="color:${overdue ? 'var(--red)' : 'var(--text-dim)'}">📅 ${deadlineStr}${overdue ? ' · Überfällig!' : ''}</div>` : ''}
        </div>
        ${t.done ? `<span class="badge badge-green">Erledigt</span>` : `<button class="btn btn-ghost btn-sm" onclick="toggleEmpTask('${user.empId}','${t.id}')">Erledigen</button>`}
      </div>`;
  }

  return `
    <div class="page-header">
      <div><div class="page-title">✅ Meine Aufgaben</div><div class="page-sub">${open.length} offen · ${done.length} erledigt</div></div>
    </div>
    <div class="page-content">
      ${open.length === 0 && done.length === 0 ? `
        <div class="empty-state">
          <div style="font-size:48px;margin-bottom:12px">🎉</div>
          <div class="empty-title">Keine Aufgaben</div>
          <div class="empty-sub">Dein Trainer hat dir noch keine Aufgaben zugewiesen.</div>
        </div>
      ` : ''}

      ${open.length > 0 ? `
        <div class="card mb-16">
          <div class="card-header"><span class="card-title">Offene Aufgaben</span><span class="badge badge-yellow" style="margin-left:auto">${open.length}</span></div>
          <div class="card-body">${open.map(taskRow).join('')}</div>
        </div>
      ` : ''}

      ${done.length > 0 ? `
        <div class="card">
          <div class="card-header"><span class="card-title">Erledigte Aufgaben</span><span class="badge badge-green" style="margin-left:auto">${done.length}</span></div>
          <div class="card-body">${done.map(taskRow).join('')}</div>
        </div>
      ` : ''}
    </div>
  `;
}

async function renderModuleContent(user, prog, modules, role) {
  modules = modules.filter(m => !m.disabled);
  const moduleId = STATE.selectedModule || modules[0]?.id;
  const mod = modules.find(m => m.id === moduleId) || modules[0];
  if (!mod) return '<div class="page-content"><div class="empty-state">Modul nicht gefunden</div></div>';

  // Personality test gets its own renderer
  if (mod.type === 'test') {
    const idx = modules.findIndex(m => m.id === mod.id);
    const nextMod = modules[idx + 1];
    const nextBtn = nextMod ? `<button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="navigate('${role}','module_content',{subModule:'${nextMod.id}'})">Weiter: ${escHtml(nextMod.title.slice(0,15))} →</button>` : '';
    return `
      <div class="page-header">
        <button class="btn btn-ghost btn-sm" onclick="navigate('${role}','modules')">← Module</button>
        <div><div class="page-title">${mod.icon} ${escHtml(mod.title)}</div><div class="page-sub">Modul ${mod.num} · ${mod.duration}</div></div>
        ${nextBtn}
      </div>
      <div class="page-content">
        ${renderPersonalityTest(user.empId, role)}
      </div>
    `;
  }

    const isDone = prog.modules?.[mod.id];
  const quizState = STATE.quizState || null;

  // ── Multi-Level Quiz ──────────────────────────────────────────
  const quizLevels = getModuleQuizLevels(mod.id);
  let quizHtml = '';

  if (quizLevels) {
    const activeLevelName = quizState?.levelName || STATE.quizLevel || 'leicht';
    const levelQuestions = quizLevels[activeLevelName] || [];
    const qi = quizState?.questionIndex ?? 0;
    const finished = quizState?.finished ?? false;
    const score = quizState?.score ?? 0;

    // Level selector tabs
    const levelTabs = QUIZ_LEVEL_NAMES.map(ln => {
      const unlocked = isLevelUnlocked(prog, mod.id, ln);
      const passed = isLevelPassed(prog, mod.id, ln);
      const isActive = ln === activeLevelName;
      const color = QUIZ_LEVEL_COLORS[ln];
      return `<button onclick="if(${unlocked}){STATE.quizLevel='${ln}';STATE.quizState=null;render()}" 
        style="padding:8px 16px;border-radius:6px;border:2px solid ${isActive ? color : passed ? color+'44' : 'var(--border)'};
        background:${isActive ? color+'22' : 'transparent'};color:${unlocked ? (isActive ? color : passed ? color : 'var(--text-dim)') : 'var(--text-faint)'};
        cursor:${unlocked ? 'pointer' : 'not-allowed'};font-size:12px;font-weight:600;transition:.15s">
        ${QUIZ_LEVEL_LABELS[ln]}${passed ? ' ✓' : !unlocked ? ' 🔒' : ''}
      </button>`;
    }).join('');

    const levelProgress = getQuizLevelProgress(prog, mod.id);
    const passedCount = QUIZ_LEVEL_NAMES.filter(l => levelProgress[l]?.passed).length;

    // Show level result or quiz questions
    if (finished) {
      const passed = score >= Math.ceil(levelQuestions.length * QUIZ_PASS_PCT);
      const nextIdx = QUIZ_LEVEL_NAMES.indexOf(activeLevelName) + 1;
      const nextLevel = QUIZ_LEVEL_NAMES[nextIdx];
      quizHtml = `
        <div class="card mt-24" style="border-color:${passed ? 'rgba(46,204,113,0.3)' : 'rgba(230,57,70,0.3)'}">
          <div class="card-header" style="border-bottom:1px solid var(--border)">
            <span class="card-title">🧩 Quiz — ${QUIZ_LEVEL_LABELS[activeLevelName]}</span>
          </div>
          <div class="card-body" style="text-align:center;padding:32px">
            <div style="font-size:48px;margin-bottom:12px">${passed ? (activeLevelName === 'profi' ? '🏆' : '🎯') : '📚'}</div>
            <div style="font-size:20px;font-weight:700;margin-bottom:8px;color:${passed ? 'var(--green)' : 'var(--red)'}">
              ${passed ? 'Bestanden!' : 'Nicht bestanden'}
            </div>
            <div class="text-dim mb-16">${score} von ${levelQuestions.length} Fragen richtig · ${Math.ceil(levelQuestions.length * QUIZ_PASS_PCT)} zum Bestehen nötig</div>
            <div class="flex gap-10" style="justify-content:center;flex-wrap:wrap">
              <button class="btn btn-outline" onclick="STATE.quizState=null;render()">Wiederholen</button>
              ${passed && nextLevel ? `<button class="btn btn-primary" onclick="STATE.quizLevel='${nextLevel}';STATE.quizState=null;render()">${QUIZ_LEVEL_LABELS[nextLevel]} starten →</button>` : ''}
              ${passed && activeLevelName === 'profi' ? '<span class="badge badge-green" style="font-size:13px;padding:8px 16px">🏆 Modul vollständig abgeschlossen!</span>' : ''}
            </div>
          </div>
        </div>
      `;
      // Auto-save result
      saveQuizLevelResult(mod.id, user.empId, activeLevelName, score, levelQuestions.length);
      // Don't call render() here to avoid loop - it was already saved
    } else if (levelQuestions.length > 0) {
      const isUnlocked = isLevelUnlocked(prog, mod.id, activeLevelName);
      if (!isUnlocked) {
        const prevLevel = QUIZ_LEVEL_NAMES[QUIZ_LEVEL_NAMES.indexOf(activeLevelName) - 1];
        quizHtml = `<div class="card mt-24"><div class="card-body" style="text-align:center;padding:24px">
          <div style="font-size:32px">🔒</div>
          <div style="margin:8px 0;font-weight:600">Level gesperrt</div>
          <div class="text-dim">Bestehe zuerst ${QUIZ_LEVEL_LABELS[prevLevel]}</div>
        </div></div>`;
      } else {
        const q = levelQuestions[qi] || levelQuestions[0];
        const answered = quizState?.answered ?? null;
        const opts = q.opts.map((o, i) => {
          let cls = '';
          if (answered !== null) {
            if (i === q.correct) cls = 'correct';
            else if (i === answered && i !== q.correct) cls = 'wrong';
          }
          return `<div class="quiz-option ${cls}" onclick="${answered === null ? `answerQuizLevel(${i},${q.correct},${qi},${levelQuestions.length},'${activeLevelName}')` : ''}">${escHtml(o)}</div>`;
        }).join('');

        quizHtml = `
          <div class="card mt-24">
            <div class="card-header">
              <span class="card-title">🧩 ${QUIZ_LEVEL_LABELS[activeLevelName]} — Frage ${qi+1}/${levelQuestions.length}</span>
              <span style="margin-left:auto;font-size:12px;color:var(--text-dim)">${Math.ceil(levelQuestions.length * QUIZ_PASS_PCT)} zum Bestehen</span>
            </div>
            <div class="card-body">
              <div style="background:var(--surface);border-radius:6px;padding:4px;display:flex;gap:4px;margin-bottom:16px">
                ${levelTabs}
              </div>
              <div style="margin-bottom:8px">
                <div style="height:4px;background:var(--border);border-radius:2px">
                  <div style="width:${((qi)/(levelQuestions.length))*100}%;height:100%;background:${QUIZ_LEVEL_COLORS[activeLevelName]};border-radius:2px;transition:.3s"></div>
                </div>
              </div>
              <div style="font-size:15px;font-weight:600;margin-bottom:16px;line-height:1.5">${escHtml(q.q)}</div>
              ${opts}
              ${answered !== null ? `<button class="btn btn-primary mt-16" onclick="nextQuizQuestion(${qi+1},${levelQuestions.length})">
                ${qi+1 < levelQuestions.length ? 'Nächste Frage →' : 'Ergebnis ansehen →'}
              </button>` : ''}
            </div>
          </div>
        `;
      }
    }

    // Level overview below content
    const levelOverview = `
      <div class="card mt-16">
        <div class="card-header"><span class="card-title">📊 Quiz-Fortschritt</span>
          <span style="margin-left:auto;font-size:12px;color:var(--text-dim)">${passedCount}/${QUIZ_LEVEL_NAMES.length} Level bestanden</span>
        </div>
        <div class="card-body" style="display:flex;gap:8px;flex-wrap:wrap">
          ${levelTabs}
        </div>
      </div>`;
    quizHtml = levelOverview + quizHtml;

  } else if (mod.quizzes && mod.quizzes.length > 0) {
    // Fallback: old quiz format
    const qi = quizState?.questionIndex ?? 0;
    const finished = quizState?.finished ?? false;
    const score = quizState?.score ?? 0;
    if (finished) {
      const passed = score >= Math.ceil(mod.quizzes.length * 0.6);
      quizHtml = `<div class="card mt-24"><div class="card-body" style="text-align:center;padding:24px">
        <div style="font-size:36px">${passed ? '✅' : '📚'}</div>
        <div style="font-weight:700;margin:8px 0">${passed ? 'Bestanden!' : 'Nicht bestanden'}</div>
        <div class="text-dim">${score}/${mod.quizzes.length} richtig</div>
        <div class="flex gap-10 mt-16" style="justify-content:center">
          ${!isDone ? `<button class="btn btn-primary" onclick="markModuleDone('${mod.id}','${user.empId}',${score},${mod.quizzes.length})">✓ Abschließen</button>` : ''}
          <button class="btn btn-outline" onclick="STATE.quizState=null;render()">Wiederholen</button>
        </div>
      </div></div>`;
    } else if (qi < mod.quizzes.length) {
      const q = mod.quizzes[qi];
      const answered = quizState?.answered ?? null;
      const opts = q.opts.map((o, i) => {
        let cls = answered !== null ? (i === q.correct ? 'correct' : i === answered ? 'wrong' : '') : '';
        return `<div class="quiz-option ${cls}" onclick="${answered === null ? `answerQuiz(${i},${q.correct},${qi},${mod.quizzes.length})` : ''}">${escHtml(o)}</div>`;
      }).join('');
      quizHtml = `<div class="card mt-24"><div class="card-header"><span class="card-title">🧩 Frage ${qi+1}/${mod.quizzes.length}</span></div>
        <div class="card-body"><div style="font-size:15px;font-weight:600;margin-bottom:16px">${escHtml(q.q)}</div>${opts}
        ${answered !== null ? `<button class="btn btn-primary mt-16" onclick="nextQuizQuestion(${qi+1},${mod.quizzes.length})">${qi+1 < mod.quizzes.length ? 'Weiter →' : 'Ergebnis →'}</button>` : ''}</div></div>`;
    }
  }

  // Mark done button (only if no quiz levels)
  const actionBar = !quizLevels && (!mod.quizzes || mod.quizzes.length === 0) ? `
    <div class="flex gap-10 mt-24">
      ${!isDone ? `<button class="btn btn-primary" onclick="markModuleDone('${mod.id}','${user.empId}',0,0)">✓ Modul abschließen</button>` : '<span class="badge badge-green" style="font-size:13px;padding:8px 14px">✓ Abgeschlossen</span>'}
      <button class="btn btn-outline" onclick="navigate('${role}','modules')">← Zurück zur Übersicht</button>
    </div>
  ` : '';

  // Module nav
  const idx = modules.findIndex(m => m.id === mod.id);
  const prev = idx > 0 ? modules[idx - 1] : null;
  const next = idx < modules.length - 1 ? modules[idx + 1] : null;

  return `
    <div class="page-header">
      <button class="btn btn-ghost btn-sm" onclick="navigate('${role}','modules')">← Module</button>
      <div>
        <div class="page-title">${mod.icon} ${escHtml(mod.title)}</div>
        <div class="page-sub">Modul ${mod.num} · ${mod.duration}${isDone ? ' · <span style="color:var(--green)">✓ Abgeschlossen</span>' : ''}</div>
      </div>
      <div class="flex gap-8" style="margin-left:auto">
        ${prev ? `<button class="btn btn-outline btn-sm" onclick="navigate('${role}','module_content',{subModule:'${prev.id}'})">← ${escHtml(prev.title.slice(0, 12))}</button>` : ''}
        ${next ? `<button class="btn btn-primary btn-sm" onclick="navigate('${role}','module_content',{subModule:'${next.id}'})">Weiter: ${escHtml(next.title.slice(0, 12))} →</button>` : ''}
      </div>
    </div>
    <div class="page-content">
      <div class="module-content">
        ${mod.content}
        ${actionBar}
        ${quizHtml}
      </div>
      ${await getModuleTypeTipBox(mod.id, user.empId)}
    </div>
  `;
}

async function getModuleTypeTipBox(moduleId, empId) {
  const tipData = await getModuleTypeTip(moduleId, empId);
  if (!tipData) return '';
  const color = typeColor(tipData.type);
  const pct = tipData.types[tipData.type];
  const emoji = TYPES[tipData.type].emoji;
  const name = typeName(tipData.type);
  const tip = escHtml(tipData.tip);
  return '<div class="card mt-24" style="border-color:' + color + '44;background:' + color + '08">' +
    '<div class="card-header" style="border-bottom-color:' + color + '22">' +
    '<span style="font-size:20px">' + emoji + '</span>' +
    '<span class="card-title">Für dich als ' + name + ' (' + pct + '%)</span>' +
    '</div><div class="card-body">' +
    '<p style="font-size:14px;line-height:1.7;color:#d0d0d0;margin:0">' + tip + '</p>' +
    '</div></div>';
}

function answerQuiz(chosen, correct, qi, total) {
  if (!STATE.quizState) STATE.quizState = { questionIndex: qi, score: 0, answered: null, finished: false };
  STATE.quizState.answered = chosen;
  if (chosen === correct) STATE.quizState.score = (STATE.quizState.score || 0) + 1;
  render();
}

function answerQuizLevel(chosen, correct, qi, total, levelName) {
  if (!STATE.quizState) STATE.quizState = { questionIndex: qi, score: 0, answered: null, finished: false, levelName };
  STATE.quizState.answered = chosen;
  STATE.quizState.levelName = levelName;
  if (chosen === correct) STATE.quizState.score = (STATE.quizState.score || 0) + 1;
  render();
}

function nextQuizQuestion(nextQi, total) {
  if (!STATE.quizState) return;
  if (nextQi >= total) {
    STATE.quizState.finished = true;
  } else {
    STATE.quizState.questionIndex = nextQi;
    STATE.quizState.answered = null;
  }
  render();
}

async function saveQuizLevelResult(moduleId, empId, levelName, score, total) {
  const prog = await getEmployeeProgress(empId);
  prog.quizLevels = prog.quizLevels || {};
  prog.quizLevels[moduleId] = prog.quizLevels[moduleId] || {};
  const passed = score >= Math.ceil(total * QUIZ_PASS_PCT);
  prog.quizLevels[moduleId][levelName] = { score, total, passed, date: new Date().toISOString() };
  // Auto-complete module when Profi passed
  if (levelName === 'profi' && passed) {
    prog.modules = prog.modules || {};
    prog.modules[moduleId] = true;
  }
  await saveEmployeeProgress(empId, prog);
  STATE.quizState = null;
  if (passed) {
    const nextIdx = QUIZ_LEVEL_NAMES.indexOf(levelName) + 1;
    const nextLevel = QUIZ_LEVEL_NAMES[nextIdx];
    if (nextLevel) {
      toast(`✅ ${QUIZ_LEVEL_LABELS[levelName]} bestanden! ${QUIZ_LEVEL_LABELS[nextLevel]} freigeschaltet 🎉`);
    } else {
      toast('🏆 Profi-Level bestanden! Modul vollständig abgeschlossen!');
    }
  } else {
    toast(`❌ Nicht bestanden (${score}/${total}). Noch ${Math.ceil(total * QUIZ_PASS_PCT) - score} Frage(n) nötig.`, 'warning');
  }
  render();
}

async function markModuleDone(moduleId, empId, score, total) {
  const prog = await getEmployeeProgress(empId);
  prog.modules = prog.modules || {};
  prog.modules[moduleId] = true;
  if (total > 0) {
    prog.quizzes = prog.quizzes || {};
    prog.quizzes[moduleId] = { correct: score, total };
  }
  await saveEmployeeProgress(empId, prog);
  STATE.quizState = null;
  toast('Modul abgeschlossen ✓');
  render();
}

async function getPracticeLogs(empId) {
  return await storageGet(`practicelog:${empId}`, true) || [];
}

async function addPracticeLog(empId) {
  const input = document.getElementById('practice-log-input');
  if (!input?.value.trim()) return;
  const logs = await getPracticeLogs(empId);
  logs.unshift({ id: 'log_' + Date.now(), text: input.value.trim(), date: new Date().toISOString() });
  await storageSet(`practicelog:${empId}`, logs.slice(0, 50), true); // Keep last 50
  input.value = '';
  toast('Praxisdoku gespeichert ✓');
  render();
}

async function deletePracticeLog(empId, logId) {
  const logs = await getPracticeLogs(empId);
  await storageSet(`practicelog:${empId}`, logs.filter(l => l.id !== logId), true);
  render();
}

async function renderEmpProgress(user, prog, modules, empData) {
  const done = Object.values(prog.modules || {}).filter(v => v).length;
  const pct = Math.round(done / modules.length * 100);
  const dt = dominantType(empData?.types);

  const modRows = modules.map(m => {
    const isDone = prog.modules?.[m.id];
    const quiz = prog.quizzes?.[m.id];
    return `
      <div class="flex items-center gap-12 mb-12" style="cursor:pointer" onclick="navigate('${user.role}','module_content',{subModule:'${m.id}'})">
        <span style="font-size:22px">${m.icon}</span>
        <div class="flex-1">
          <div style="font-size:13px;font-weight:600">${escHtml(m.title)}</div>
          ${quiz ? `<div class="text-sm text-dim">Quiz: ${quiz.correct}/${quiz.total} richtig</div>` : ''}
        </div>
        ${isDone ? '<span class="badge badge-green">✓ Abgeschlossen</span>' : '<span class="badge badge-gray">Ausstehend</span>'}
      </div>
    `;
  }).join('');

  return `
    <div class="page-header">
      <div><div class="page-title">Mein Fortschritt</div><div class="page-sub">Gesamtübersicht</div></div>
    </div>
    <div class="page-content">
      <div class="grid-2 mb-24">
        <div class="card">
          <div class="card-header"><span class="card-title">Lernfortschritt</span></div>
          <div class="card-body">
            <div class="stat-value mb-8">${pct}%</div>
            <div class="progress-wrap mb-12"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="text-dim text-sm">${done} von ${modules.length} Modulen abgeschlossen</div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">Dein Typ</span></div>
          <div class="card-body">
            ${empData?.types ? `<div class="type-bars">${renderTypeBars(empData.types)}</div>` : '<div class="text-dim text-sm">Noch nicht hinterlegt</div>'}
            ${dt ? `<div class="info-box mt-12"><p>Dein Haupttyp: <strong style="color:${typeColor(dt)}">${TYPES[dt].emoji} ${typeName(dt)}</strong><br><span class="text-sm">${escHtml(TYPES[dt].desc)}</span></p></div>` : ''}
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Alle Module</span></div>
        <div class="card-body">${modRows}</div>
      </div>
    </div>
  `;
}

// Get tip for current employee's type for a given module
async function getModuleTypeTip(moduleId, empId) {
  if (!empId) return null;
  const emp = await getEmployee(empId);
  if (!emp?.types) return null;
  const dt = dominantType(emp.types);
  if (!dt) return null;
  const tips = TYPE_MODULE_TIPS[moduleId];
  if (!tips || !tips[dt]) return null;
  return { type: dt, tip: tips[dt], types: emp.types };
}

// ── Commitment-Tracking / Entwicklungskurve ────────────────────
function renderScoreChart(sessions) {
  if (!sessions.length) return '';
  const scored = sessions.filter(s => s.overallScore).reverse().slice(-12);
  if (scored.length < 2) return '';
  const W = 480, H = 120, PAD = 24;
  const scores = scored.map(s => s.overallScore);
  const maxS = Math.max(10, ...scores);
  const pts = scores.map((s, i) => {
    const x = PAD + (i / (scored.length - 1)) * (W - PAD*2);
    const y = H - PAD - ((s / maxS) * (H - PAD*2));
    return `${x},${y}`;
  }).join(' ');
  const dotColor = s => s >= 7 ? '#2ecc71' : s >= 4 ? '#f5c800' : '#e63946';
  const dots = scores.map((s, i) => {
    const x = PAD + (i / (scored.length - 1)) * (W - PAD*2);
    const y = H - PAD - ((s / maxS) * (H - PAD*2));
    return `<circle cx="${x}" cy="${y}" r="5" fill="${dotColor(s)}"/>
      <text x="${x}" y="${y-9}" text-anchor="middle" font-size="10" fill="${dotColor(s)}">${s}</text>`;
  }).join('');
  const avg = Math.round(scores.reduce((a,b) => a+b, 0) / scores.length * 10) / 10;
  const trend = scores.length > 1 ? (scores[scores.length-1] > scores[0] ? '↑' : scores[scores.length-1] < scores[0] ? '↓' : '→') : '→';
  return `
    <div class="card mt-16">
      <div class="card-header">
        <span class="card-title">📈 Score-Verlauf</span>
        <span style="margin-left:auto;font-size:13px">Ø ${avg}/10 <strong style="color:${avg>=7?'var(--green)':avg>=4?'var(--yellow)':'var(--red)'}">${trend}</strong></span>
      </div>
      <div class="card-body" style="padding:8px 0 4px">
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px">
          <line x1="${PAD}" y1="${H-PAD}" x2="${W-PAD}" y2="${H-PAD}" stroke="var(--border)" stroke-width="1"/>
          <polyline points="${pts}" fill="none" stroke="var(--yellow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          ${dots}
        </svg>
        <div style="font-size:10px;color:var(--text-faint);text-align:center;padding-bottom:4px">Letzte ${scored.length} Sessions</div>
      </div>
    </div>`;
}

async function renderCommitmentTimeline(empId) {
  const sessions = await getCoachingSessions(empId);
  if (sessions.length === 0) return '<div class="text-dim text-sm">Noch keine abgeschlossenen Sessions.</div>';

  const fulfillmentIcon = { yes: '✅', partial: '⚡', no: '❌', undefined: '—' };
  const fulfillmentColor = { yes: 'var(--green)', partial: 'var(--yellow)', no: 'var(--red)', undefined: 'var(--text-dim)' };

  // Score trend
  const scoredSessions = sessions.filter(s => s.overallScore).reverse();
  const avgScore = scoredSessions.length > 0 ? Math.round(scoredSessions.reduce((a,b) => a + b.overallScore, 0) / scoredSessions.length * 10) / 10 : null;

  const timeline = sessions.map((s, idx) => {
    const cf = s.commitmentFulfilled;
    const sessionTypeInfo = SESSION_TYPE_FIELDS[s.sessionType];
    return `
      <div style="display:flex;gap:14px;margin-bottom:16px">
        <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">
          <div style="width:36px;height:36px;border-radius:50%;background:${s.overallScore >= 7 ? 'rgba(46,204,113,0.15)' : s.overallScore >= 4 ? 'rgba(245,200,0,0.15)' : 'rgba(230,57,70,0.15)'};border:2px solid ${s.overallScore >= 7 ? 'var(--green)' : s.overallScore >= 4 ? 'var(--yellow)' : 'var(--red)'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:${s.overallScore >= 7 ? 'var(--green)' : s.overallScore >= 4 ? 'var(--yellow)' : 'var(--red)'}">
            ${s.overallScore || '—'}
          </div>
          ${idx < sessions.length - 1 ? '<div style="flex:1;width:2px;background:var(--border);min-height:20px;margin:4px 0"></div>' : ''}
        </div>
        <div class="card flex-1" style="margin-bottom:0">
          <div class="card-body" style="padding:12px 14px">
            <div class="flex items-center gap-8 mb-8">
              <span style="font-size:13px;font-weight:600">${formatDate(s.date)}</span>
              <span class="badge badge-gray">${sessionTypeInfo?.icon || '📋'} ${escHtml(sessionTypeInfo?.label || s.sessionType || '')}</span>
              ${s.anlass ? `<span class="text-dim text-sm">${escHtml(s.anlass)}</span>` : ''}
            </div>
            ${s.commitment ? `
              <div style="font-size:13px;margin-bottom:6px">
                <span class="text-dim">Commitment: </span>
                <span>${escHtml(s.commitment)}</span>
              </div>
            ` : ''}
            ${cf ? `
              <div style="font-size:12px;color:${fulfillmentColor[cf]}">
                ${fulfillmentIcon[cf]} ${cf === 'yes' ? 'Erfüllt' : cf === 'partial' ? 'Teilweise erfüllt' : 'Nicht erfüllt'}
              </div>
            ` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `
    ${avgScore ? `
      <div class="flex gap-12 mb-16">
        <div class="stat-card" style="flex:1;padding:14px">
          <div class="stat-value" style="font-size:24px">${avgScore}/10</div>
          <div class="stat-label">⌀ Session-Score</div>
        </div>
        <div class="stat-card" style="flex:1;padding:14px">
          <div class="stat-value" style="font-size:24px">${sessions.length}</div>
          <div class="stat-label">Sessions gesamt</div>
        </div>
        <div class="stat-card" style="flex:1;padding:14px">
          <div class="stat-value" style="font-size:24px">${sessions.filter(s=>s.commitmentFulfilled==='yes').length}</div>
          <div class="stat-label">Commitments erfüllt</div>
        </div>
      </div>
    ` : ''}
    <div>${timeline}</div>
  `;
}

// ── Test State ─────────────────────────────────────────────────
let testState = {
  empId: null,      // welcher User gerade testet
  answers: {},      // questionIndex -> typeKey
  finished: false,
  result: null
};

function resetTestStateIfNeeded(empId) {
  // Wenn ein anderer User den Test öffnet → State komplett zurücksetzen
  if (testState.empId !== empId) {
    testState = { empId, answers: {}, finished: false, result: null };
  }
}

function renderPersonalityTest(empId, role) {
  resetTestStateIfNeeded(empId);
  if (testState.finished && testState.result) {
    return renderTestResult(empId);
  }

  const total = PERSONALITY_TEST.questions.length;
  const answered = Object.keys(testState.answers).length;
  const pct = Math.round(answered / total * 100);

  const questions = PERSONALITY_TEST.questions.map((q, qi) => {
    const selected = testState.answers[qi];
    // Shuffle options consistently per question (based on qi)
    const opts = [...q.opts];

    return `
      <div class="card mb-16 ${selected ? 'done' : ''}" id="q-${qi}" style="border-color:${selected ? 'rgba(46,204,113,0.3)' : 'var(--border)'}">
        <div class="card-body">
          <div class="flex items-center gap-10 mb-14">
            <span class="badge badge-gray" style="flex-shrink:0">Frage ${qi + 1}</span>
            <div style="font-size:14px;font-weight:600">${escHtml(q.q)}</div>
            ${selected ? '<span style="color:var(--green);margin-left:auto;flex-shrink:0">✓</span>' : ''}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            ${opts.map((o, oi) => {
              const isSelected = selected === o.type;
              return `
                <div onclick="selectTestAnswer(${qi},'${o.type}')"
                  style="padding:12px 14px;border-radius:6px;cursor:pointer;border:1px solid ${isSelected ? 'var(--yellow)' : 'var(--border)'};
                    background:${isSelected ? 'rgba(245,200,0,0.1)' : 'var(--surface)'};
                    color:${isSelected ? 'var(--yellow)' : 'var(--text)'};
                    font-size:13px;line-height:1.5;transition:all .15s">
                  ${isSelected ? '● ' : '○ '}${escHtml(o.text)}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="module-content">
      <h2>🧠 Persönlichkeitstest</h2>
      <p>${PERSONALITY_TEST.intro}</p>
      
      <div style="background:var(--surface);border-radius:8px;padding:16px;margin-bottom:24px">
        <div class="flex justify-between mb-8">
          <span class="text-dim text-sm">${answered} von ${total} beantwortet</span>
          <span class="font-bold text-yellow">${pct}%</span>
        </div>
        <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      ${questions}

      <div style="margin-top:24px">
        ${answered === total
          ? `<button class="btn btn-primary btn-lg" onclick="finishPersonalityTest('${empId}')">📊 Auswertung anzeigen →</button>`
          : `<div class="text-dim text-sm">Beantworte alle ${total - answered} verbleibenden Fragen um dein Ergebnis zu sehen.</div>`
        }
      </div>
    </div>
  `;
}

function selectTestAnswer(qi, typeKey) {
  // Sicherheit: State gehört zum aktuell eingeloggten User
  if (!testState.empId) testState.empId = STATE.currentUser?.empId || null;
  testState.answers[qi] = typeKey;
  // Re-render just this question card
  const card = document.getElementById(`q-${qi}`);
  if (card) {
    const q = PERSONALITY_TEST.questions[qi];
    card.style.borderColor = 'rgba(46,204,113,0.3)';
    card.querySelector('.card-body').innerHTML = `
      <div class="flex items-center gap-10 mb-14">
        <span class="badge badge-gray" style="flex-shrink:0">Frage ${qi + 1}</span>
        <div style="font-size:14px;font-weight:600">${escHtml(q.q)}</div>
        <span style="color:var(--green);margin-left:auto;flex-shrink:0">✓</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${q.opts.map(o => `
          <div onclick="selectTestAnswer(${qi},'${o.type}')"
            style="padding:12px 14px;border-radius:6px;cursor:pointer;border:1px solid ${o.type === typeKey ? 'var(--yellow)' : 'var(--border)'};
              background:${o.type === typeKey ? 'rgba(245,200,0,0.1)' : 'var(--surface)'};
              color:${o.type === typeKey ? 'var(--yellow)' : 'var(--text)'};
              font-size:13px;line-height:1.5;transition:all .15s">
            ${o.type === typeKey ? '● ' : '○ '}${escHtml(o.text)}
          </div>
        `).join('')}
      </div>
    `;
  }

  // Update progress bar
  const answered = Object.keys(testState.answers).length;
  const total = PERSONALITY_TEST.questions.length;
  const pct = Math.round(answered / total * 100);
  document.querySelectorAll('.progress-fill')[0]?.style && (document.querySelectorAll('.progress-fill')[0].style.width = pct + '%');
  const progText = document.querySelector('[class*="text-dim text-sm"]');

  // Show finish button when all answered
  const btnArea = document.querySelector('[style*="margin-top:24px"]');
  if (btnArea && answered === total) {
    btnArea.innerHTML = `<button class="btn btn-primary btn-lg" onclick="finishPersonalityTest('${STATE.currentUser?.empId}')">📊 Auswertung anzeigen →</button>`;
  }

  // Auto-scroll to next unanswered question
  const nextUnanswered = PERSONALITY_TEST.questions.findIndex((_, i) => !testState.answers[i] && i > qi);
  if (nextUnanswered >= 0) {
    setTimeout(() => {
      document.getElementById(`q-${nextUnanswered}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 200);
  }
}

async function finishPersonalityTest(empId) {
  const counts = { C: 0, I: 0, S: 0, G: 0 };
  Object.values(testState.answers).forEach(t => counts[t]++);
  const total = Object.values(counts).reduce((a, b) => a + b, 0);
  const result = {};
  Object.entries(counts).forEach(([k, v]) => result[k] = Math.round(v / total * 100));

  testState.result = result;
  testState.finished = true;

  // Save to employee profile
  if (empId) {
    const emp = await getEmployee(empId);
    if (emp) {
      emp.types = result;
      await saveEmployee(emp);
    }
    // Mark module as done
    const prog = await getEmployeeProgress(empId);
    prog.modules = prog.modules || {};
    const empRole = STATE.employees?.find(e => e.id === empId)?.role || 'ad';
    prog.modules[`persoenlichkeit_${empRole}`] = true;
    await saveEmployeeProgress(empId, prog);
  }

  render();
  window.scrollTo(0, 0);
}

function renderTestResult(empId) {
  const result = testState.result;
  const dominant = Object.entries(result).sort((a, b) => b[1] - a[1])[0][0];
  const dt = TYPES[dominant];

  const bars = ['C', 'I', 'S', 'G'].sort((a, b) => result[b] - result[a]).map(k => `
    <div class="flex items-center gap-12 mb-12">
      <div style="width:110px;font-weight:700;color:${typeColor(k)}">${TYPES[k].emoji} ${typeName(k)}</div>
      <div style="flex:1;height:28px;background:var(--border);border-radius:6px;overflow:hidden">
        <div style="height:100%;width:${result[k]}%;background:${typeColor(k)};border-radius:6px;transition:width .6s;display:flex;align-items:center;padding-left:10px">
          <span style="font-size:13px;font-weight:700;color:${k === 'S' ? 'var(--black)' : 'var(--black)'}">${result[k]}%</span>
        </div>
      </div>
    </div>
  `).join('');

  const tips = {
    C: { st: 'Direkt, schnell, abschlussstark', fa: 'Ungeduldig, hört zu wenig zu', tipp: 'Übe bewusstes Zuhören. Dein größtes Plus ist dein Drive — kombiniere es mit mehr Empathie und du wirst unschlagbar.' },
    I: { st: 'Begeisternd, beziehungsstark, überzeugend', fa: 'Zu gefällig, gibt zu früh nach', tipp: 'Übe bewusstes Schweigen nach einem Angebot. Deine Stärke ist Rapport — nutze ihn, aber verlier dabei nicht deine Verhandlungsposition.' },
    S: { st: 'Zuverlässig, loyal, vertrauenswürdig', fa: 'Gibt bei Druck nach, meidet Konflikte', tipp: 'Berechne vor jedem Termin deine BATNA und schreibe sie auf. Das gibt dir die Sicherheit die du brauchst, um standhaft zu bleiben.' },
    G: { st: 'Präzise, vorbereitet, faktenbasiert', fa: 'Entscheidet zu langsam, erklärt zu viel', tipp: 'Übe die Sowjet-Methode: Position nennen, schweigen. Du musst nicht alles erklären — lass die Zahlen für dich sprechen.' }
  };

  return `
    <div class="module-content">
      <h2>📊 Dein Ergebnis</h2>
      
      <div class="card mb-24" style="border-color:${typeColor(dominant)}44;background:${typeColor(dominant)}11">
        <div class="card-body" style="padding:24px">
          <div class="flex items-center gap-16 mb-16">
            <span style="font-size:48px">${dt.emoji}</span>
            <div>
              <div class="text-dim text-sm mb-4">Dein Haupttyp</div>
              <div style="font-size:24px;font-weight:800;color:${typeColor(dominant)}">${typeName(dominant)}</div>
              <div class="text-dim">${dt.desc}</div>
            </div>
          </div>
        </div>
      </div>

      <div class="mb-24">
        <h3>Deine Typ-Verteilung</h3>
        ${bars}
      </div>

      <div class="grid-2 mb-24">
        <div class="tip-box">
          <p>✅ <strong>Deine Stärken:</strong><br>${tips[dominant].st}</p>
        </div>
        <div class="warning-box">
          <p>⚠️ <strong>Deine Fallen:</strong><br>${tips[dominant].fa}</p>
        </div>
      </div>

      <div class="info-box mb-24">
        <p>💡 <strong>Dein persönlicher Tipp:</strong><br>${tips[dominant].tipp}</p>
      </div>

      <div class="flex gap-10">
        <button class="btn btn-primary" onclick="navigate('${STATE.currentUser?.role}','modules')">Weiter zu den Modulen →</button>
        <button class="btn btn-outline" onclick="testState={answers:{},finished:false,result:null};render()">Test wiederholen</button>
      </div>
    </div>
  `;
}


// ══════════════════════════════════════════════════════════════
//  LOGIN PAGE
// ══════════════════════════════════════════════════════════════

function renderLoginPage() {
  const role = STATE.loginRole || 'trainer';
  return `
    <div class="login-page">
      <div class="login-box">
        <div class="login-logo">
          <div class="mark">WW</div>
          <h1>WEWO</h1>
          <p>we make it work! — Training Platform</p>
        </div>
        
        <div class="role-selector mb-20">
          <div class="role-btn ${role === 'trainer' ? 'selected' : ''}" onclick="STATE.loginRole='trainer';render()">
            <span class="role-icon">🎓</span>
            <div class="role-label">Trainer</div>
          </div>
          <div class="role-btn ${role === 'ad' ? 'selected' : ''}" onclick="STATE.loginRole='ad';render()">
            <span class="role-icon">🚗</span>
            <div class="role-label">Außendienst</div>
          </div>
          <div class="role-btn ${role === 'id' ? 'selected' : ''}" onclick="STATE.loginRole='id';render()">
            <span class="role-icon">📞</span>
            <div class="role-label">Innendienst</div>
          </div>
        </div>

        ${role !== 'trainer' ? `
          <div class="form-group">
            <label class="form-label">Name</label>
            <input class="input" id="login-name" placeholder="Vor- und Nachname"
              onkeydown="if(event.key==='Enter')doLogin()">
          </div>
        ` : ''}

        <div class="form-group">
          <label class="form-label">Passwort</label>
          <input class="input" id="login-pass" type="password" 
            placeholder="${role === 'trainer' ? 'Trainer-Passwort' : 'Dein Passwort'}"
            onkeydown="if(event.key==='Enter')doLogin()">
        </div>

        <button class="btn btn-primary btn-lg" style="width:100%" onclick="doLogin()">
          Anmelden →
        </button>
        
        <div id="login-error" class="text-sm" style="color:var(--red);margin-top:12px;text-align:center;display:none"></div>
      </div>
    </div>
  `;
}

async function doLogin() {
  const role = STATE.loginRole || 'trainer';
  const pass = document.getElementById('login-pass')?.value || '';
  const errEl = document.getElementById('login-error');

  if (!pass) { showLoginError('Bitte Passwort eingeben'); return; }

  if (role === 'trainer') {
    const ok = await loginTrainer(pass);
    if (ok) {
      STATE.loginRole = null;
      navigate('trainer', 'dashboard');
    } else {
      showLoginError('Falsches Passwort');
    }
  } else {
    const name = document.getElementById('login-name')?.value?.trim() || '';
    if (!name) { showLoginError('Bitte Name eingeben'); return; }
    const result = await loginEmployee(name, pass, role);
    if (result.ok) {
      STATE.loginRole = null;
      navigate(role, 'home');
    } else {
      showLoginError(result.msg);
    }
  }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

function logout() {
  try { localStorage.removeItem('wewo_session'); } catch {}
  STATE.currentUser = null;
  STATE.page = 'login';
  STATE.subPage = null;
  STATE.selectedEmployee = null;
  STATE.quizState = null;
  chatHistory = [];
  currentScenario = null;
  roleplaying = false;
  aiTyping = false;
  STATE.selectedModule = null;
  STATE.modalOpen = null;
  // Persönlichkeitstest-State beim Logout immer zurücksetzen
  testState = { empId: null, answers: {}, finished: false, result: null };
  render();
}

// ══════════════════════════════════════════════════════════════
//  MAIN RENDER + INIT
// ══════════════════════════════════════════════════════════════

async function render() {
  const app = document.getElementById('app');
  if (!app) return;

  // Show loading for async renders
  if (!STATE.currentUser) {
    app.innerHTML = renderLoginPage();
    return;
  }

  app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh"><div class="loading-spin"></div></div>';

  try {
    let html = '';
    const role = STATE.currentUser.role;
    const page = STATE.page;

    if (role === 'trainer') {
      html = await renderTrainerPortal();
    } else if (role === 'ad' || role === 'id') {
      if (page === 'roleplay') {
        // Active roleplay page
        html = await renderEmployeePortal();
        app.innerHTML = html;
        // Initialize chat area after DOM update
        setTimeout(() => renderChatArea(), 50);
        return;
      } else {
        html = await renderEmployeePortal();
      }
    } else {
      html = renderLoginPage();
    }

    app.innerHTML = html;
  } catch (e) {
    console.error('Render error:', e);
    app.innerHTML = `<div class="page-content"><div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="font-bold mb-8">Fehler beim Laden</div>
      <div class="text-dim">${escHtml(e.message || 'Unbekannter Fehler')}</div>
      <button class="btn btn-primary mt-16" onclick="render()">Neu laden</button>
    </div></div>`;
  }
}

// Override navigate to handle module sub-state
const _navigate = navigate;
function navigate(page, subPage = null, extra = {}) {
  STATE.page = page;
  STATE.subPage = subPage;
  if (extra.selectedEmployee !== undefined) STATE.selectedEmployee = extra.selectedEmployee;
  if (extra.subModule !== undefined) {
    STATE.selectedModule = extra.subModule;
    STATE.quizState = null;
  }
  render();
  window.scrollTo(0, 0);
}

// Override startRoleplay to set correct sub-page
const _startRoleplay = startRoleplay;
async function startRoleplay(scenario) {
  if (!scenario) return;
  currentScenario = scenario;
  chatHistory = [];
  roleplaying = true;
  STATE.subPage = 'active_roleplay';
  render();

  setTimeout(async () => {
    aiTyping = true;
    renderChatArea();
    try {
      const opening = await callClaude(
        [{ role: 'user', content: 'Starte das Gespräch mit einem kurzen, natürlichen Einstieg als deine Rolle. Max 2 Sätze.' }],
        scenario.system
      );
      chatHistory.push({ role: 'assistant', content: opening });
    } catch {
      chatHistory.push({ role: 'assistant', content: 'Hallo? Wer ist da bitte?' });
    }
    aiTyping = false;
    renderChatArea();
  }, 300);
}

function saveSession() {
  try { localStorage.setItem('wewo_session', JSON.stringify(STATE.currentUser)); } catch {}
}

function restoreSession() {
  try {
    const saved = localStorage.getItem('wewo_session');
    if (saved) {
      const user = JSON.parse(saved);
      if (user && user.role) return user;
    }
  } catch {}
  return null;
}

function init() {
  STATE.loginRole = 'trainer';
  loadApiKey();
  const savedUser = restoreSession();
  if (savedUser) {
    STATE.currentUser = savedUser;
    STATE.page = savedUser.role === 'trainer' ? 'trainer' : savedUser.role;
  }
  render();
}

window.addEventListener('DOMContentLoaded', init);

</script>
</body>
</html>
